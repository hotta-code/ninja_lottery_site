<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>本物の忍者は誰だ！？</title>
  <style>
    :root {
      --bg: #090909;
      --panel: #121212;
      --panel-2: #191919;
      --line: #303030;
      --text: #f8f4ea;
      --muted: #bcb5a5;
      --gold: #f2c14e;
      --red: #d94435;
      --green: #3ecf8e;
      --shadow: rgba(0, 0, 0, .45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 8%, rgba(242, 193, 78, .12), transparent 28rem),
        radial-gradient(circle at 78% 18%, rgba(217, 68, 53, .12), transparent 24rem),
        linear-gradient(135deg, #070707 0%, #12100c 52%, #090909 100%);
      color: var(--text);
      font-family: "HGS行書体", "HG行書体", "游明朝", "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
    }

    body {
      padding: 18px;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #202020;
      color: var(--text);
      min-height: 44px;
      padding: 10px 14px;
      font-weight: 900;
      letter-spacing: .08em;
      cursor: pointer;
      transition: transform .08s ease, border-color .16s ease, background .16s ease;
    }

    button:hover {
      border-color: rgba(242, 193, 78, .62);
      background: #282828;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .app {
      width: min(1280px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .topbar {
      min-height: 84px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      background: rgba(18, 18, 18, .86);
      box-shadow: 0 18px 44px var(--shadow);
    }

    .mark {
      width: 56px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        conic-gradient(from 45deg, transparent 0 12%, var(--gold) 12% 18%, transparent 18% 37%, var(--red) 37% 43%, transparent 43% 62%, var(--gold) 62% 68%, transparent 68% 87%, var(--red) 87% 93%, transparent 93%),
        #161616;
      border: 1px solid rgba(255, 255, 255, .16);
      box-shadow: inset 0 0 0 10px #101010, 0 10px 24px var(--shadow);
    }

    .mark::after {
      content: "";
      width: 14px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--text);
      box-shadow: 0 0 0 4px #101010;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1;
      letter-spacing: .14em;
      font-weight: 900;
    }

    .status {
      display: grid;
      gap: 4px;
      min-width: 160px;
      text-align: right;
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
    }

    .status strong {
      color: var(--gold);
      font-size: 24px;
      line-height: 1;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel,
    .stage,
    .resultbar {
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      background: rgba(18, 18, 18, .88);
      box-shadow: 0 16px 42px var(--shadow);
    }

    .panel {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .panelHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: .12em;
      font-weight: 900;
    }

    .count {
      color: var(--gold);
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d0d0d;
      color: var(--text);
      padding: 12px;
      font-size: 16px;
      line-height: 1.55;
      font-weight: 700;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(242, 193, 78, .7);
      box-shadow: 0 0 0 3px rgba(242, 193, 78, .12);
    }

    .setting {
      display: grid;
      gap: 8px;
    }

    .setting label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d0d0d;
      color: var(--text);
      padding: 8px 12px;
      font: inherit;
      font-weight: 900;
      outline: none;
    }

    select:focus {
      border-color: rgba(242, 193, 78, .7);
      box-shadow: 0 0 0 3px rgba(242, 193, 78, .12);
    }

    .history {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      background: rgba(0, 0, 0, .16);
    }

    .historyTitle {
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    .historyButtons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .historyBtn {
      min-height: 38px;
      padding: 8px;
      font-size: 13px;
    }

    .historyBtn.empty {
      opacity: .5;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .start {
      width: 100%;
      min-height: 56px;
      border: 0;
      background: linear-gradient(135deg, #ffe08a, #f0b62b);
      color: #17120a;
      font-size: 20px;
      box-shadow: 0 12px 28px rgba(242, 193, 78, .16);
    }

    .danger {
      border-color: rgba(217, 68, 53, .45);
    }

    .error {
      display: none;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(217, 68, 53, .5);
      background: rgba(217, 68, 53, .12);
      color: #ffd1cc;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }

    .stage {
      min-height: 560px;
      padding: 16px;
      overflow: hidden;
      background:
        linear-gradient(rgba(0, 0, 0, .2), rgba(0, 0, 0, .5)),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, .035) 0 1px, transparent 1px 14px),
        rgba(18, 18, 18, .88);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
      gap: 18px;
      align-items: stretch;
    }

    .card {
      position: relative;
      min-height: 178px;
      padding: 12px 10px 14px;
      display: grid;
      grid-template-rows: 1fr auto auto;
      justify-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .025));
      overflow: hidden;
      transition: transform .18s ease, filter .18s ease;
    }

    .character {
      width: 92px;
      height: 112px;
      align-self: end;
      object-fit: contain;
      filter: drop-shadow(0 10px 10px rgba(0, 0, 0, .35));
    }

    .ninja {
      background: #111;
      border: 2px solid #323232;
    }

    .ninja::before {
      content: "";
      position: absolute;
      left: 13px;
      right: 13px;
      top: 24px;
      height: 16px;
      border-radius: 999px;
      background: #f6d7a8;
      box-shadow: inset 12px 0 0 rgba(0, 0, 0, .15);
    }

    .ninja::after {
      content: "";
      position: absolute;
      left: 23px;
      top: 29px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #111;
      box-shadow: 22px 0 0 #111;
    }

    .monkey {
      background: #7a4a27;
      border: 2px solid #b47a42;
    }

    .monkey::before,
    .monkey::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .monkey::before {
      left: 9px;
      right: 9px;
      bottom: 8px;
      height: 42px;
      background: #f0c28b;
      box-shadow:
        -19px -8px 0 -7px #7a4a27,
        19px -8px 0 -7px #7a4a27,
        inset 0 -9px 0 rgba(120, 74, 39, .16);
    }

    .monkey::after {
      left: 24px;
      top: 28px;
      width: 6px;
      height: 6px;
      background: #111;
      box-shadow:
        20px 0 0 #111,
        10px 14px 0 2px #8d4c30;
    }

    .number {
      min-width: 44px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(242, 193, 78, .14);
      border: 1px solid rgba(242, 193, 78, .4);
      color: var(--gold);
      font-weight: 900;
    }

    .name {
      width: 100%;
      min-height: 42px;
      display: grid;
      place-items: center;
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .smoke {
      position: absolute;
      inset: -20px;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 42% 48%, rgba(255, 255, 255, .95) 0 7%, transparent 20%),
        radial-gradient(circle at 55% 42%, rgba(255, 255, 255, .74) 0 9%, transparent 25%),
        radial-gradient(circle at 60% 58%, rgba(255, 255, 255, .62) 0 12%, transparent 30%);
      filter: blur(8px);
    }

    .card.out {
      animation: vanish .72s ease forwards;
    }

    .card.out .smoke {
      animation: smoke .72s ease forwards;
    }

    .doron {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      color: #fff;
      font-size: clamp(24px, 4vw, 44px);
      font-weight: 900;
      letter-spacing: .12em;
      text-shadow:
        0 2px 0 rgba(0, 0, 0, .65),
        0 0 18px rgba(255, 255, 255, .85);
    }

    .card.out .doron {
      animation: doron .72s ease forwards;
    }

    .card.hide {
      display: none;
    }

    .card.win {
      transform: scale(1.08);
      filter: drop-shadow(0 0 24px rgba(242, 193, 78, .75));
      border-color: rgba(242, 193, 78, .82);
    }

    @keyframes smoke {
      0% {
        opacity: 0;
        transform: scale(.35);
      }
      35% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: scale(1.7) translateY(-28px);
      }
    }

    @keyframes doron {
      0% {
        opacity: 0;
        transform: scale(.55) rotate(-8deg);
      }
      28% {
        opacity: 1;
        transform: scale(1.08) rotate(2deg);
      }
      100% {
        opacity: 0;
        transform: scale(1.35) translateY(-18px) rotate(0deg);
      }
    }

    @keyframes vanish {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      60% {
        opacity: .35;
        transform: scale(.92);
      }
      100% {
        opacity: 0;
        transform: scale(.48);
      }
    }

    .resultbar {
      display: grid;
      grid-template-columns: auto auto auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }

    .winner {
      justify-self: end;
      color: var(--gold);
      font-size: 18px;
      font-weight: 900;
      text-align: right;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, .82);
    }

    .overlay.show {
      display: grid;
    }

    .modal {
      width: min(640px, 100%);
      padding: clamp(24px, 5vw, 44px);
      border-radius: 8px;
      border: 2px solid rgba(242, 193, 78, .9);
      background:
        radial-gradient(circle at center top, rgba(242, 193, 78, .2), transparent 22rem),
        #111;
      box-shadow: 0 26px 80px rgba(0, 0, 0, .72);
      text-align: center;
    }

    .modalTitle {
      color: var(--gold);
      font-size: clamp(42px, 8vw, 78px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: .08em;
    }

    .modalName {
      margin-top: 16px;
      font-size: clamp(26px, 5vw, 46px);
      line-height: 1.25;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .modal button {
      margin-top: 24px;
      min-width: 140px;
    }

    @media (max-width: 860px) {
      body {
        padding: 10px;
      }

      .topbar {
        grid-template-columns: auto 1fr;
      }

      .status {
        grid-column: 1 / -1;
        min-width: 0;
        text-align: left;
      }

      .layout,
      .resultbar {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 220px;
      }

      .stage {
        min-height: 430px;
      }

      .winner {
        justify-self: start;
        text-align: left;
      }
    }

    body.recordMode {
      min-height: 100dvh;
      overflow: hidden;
      padding: 6px;
      background:
        radial-gradient(circle at 50% 8%, rgba(242, 193, 78, .12), transparent 18rem),
        #050505;
    }

    body.recordMode .app {
      width: min(100%, calc(100dvh * 9 / 16));
      min-height: calc(100dvh - 12px);
      grid-template-rows: auto 1fr auto;
      gap: 8px;
    }

    body.recordMode .topbar {
      min-height: 0;
      grid-template-columns: 1fr auto;
      padding: 10px 12px;
    }

    body.recordMode .mark {
      display: none;
    }

    body.recordMode h1 {
      font-size: clamp(24px, 7vw, 38px);
      line-height: 1.08;
    }

    body.recordMode .status {
      min-width: 72px;
      text-align: right;
      font-size: 11px;
    }

    body.recordMode .layout {
      display: block;
      min-height: 0;
    }

    body.recordMode .panel {
      display: none;
    }

    body.recordMode .stage {
      height: 100%;
      min-height: 0;
      padding: 10px;
      overflow: hidden;
    }

    body.recordMode .grid {
      height: 100%;
      grid-template-columns: repeat(var(--record-cols, 3), minmax(0, 1fr));
      grid-template-rows: repeat(var(--record-rows, 3), minmax(0, 1fr));
      gap: var(--record-gap, 8px);
      align-items: stretch;
    }

    body.recordMode .card {
      min-height: 0;
      padding: var(--record-pad, 8px) 5px;
      gap: 3px;
      grid-template-rows: minmax(0, 1fr) auto auto;
    }

    body.recordMode .character {
      width: var(--record-char-w, 76px);
      height: var(--record-char-h, 92px);
      max-width: 100%;
      max-height: 100%;
    }

    body.recordMode .number {
      height: var(--record-number-h, 26px);
      min-width: 0;
      width: min(100%, 58px);
      font-size: var(--record-number-font, 13px);
    }

    body.recordMode .name {
      min-height: 0;
      font-size: var(--record-name-font, 14px);
      line-height: 1.12;
    }

    body.recordMode .doron {
      font-size: var(--record-doron-font, 28px);
    }

    body.recordMode .resultbar {
      grid-template-columns: 1fr 1fr 1fr;
      padding: 8px;
      gap: 8px;
    }

    body.recordMode .winner {
      grid-column: 1 / -1;
      justify-self: center;
      text-align: center;
      font-size: clamp(16px, 4vw, 22px);
    }

    body.recordMode #recordBtn {
      border-color: rgba(242, 193, 78, .7);
      color: var(--gold);
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="mark" aria-hidden="true"></div>
      <div>
        <h1>本物の忍者は誰だ！？</h1>
      </div>
      <div class="status">
        <span>残り人数</span>
        <strong id="remaining">0</strong>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="panelHead">
          <h2>参加者</h2>
          <div class="count" id="count">0名</div>
        </div>
        <textarea id="input" spellcheck="false"></textarea>
        <div class="setting">
          <label for="durationSelect">決定までの秒数</label>
          <select id="durationSelect">
            <option value="10">10秒</option>
            <option value="11">11秒</option>
            <option value="12">12秒</option>
            <option value="13">13秒</option>
            <option value="14">14秒</option>
            <option value="15" selected>15秒</option>
            <option value="16">16秒</option>
            <option value="17">17秒</option>
            <option value="18">18秒</option>
            <option value="19">19秒</option>
            <option value="20">20秒</option>
          </select>
        </div>
        <div class="history">
          <div class="historyTitle">履歴</div>
          <div class="historyButtons" id="historyButtons"></div>
        </div>
        <div class="actions">
          <button type="button" id="sampleBtn">サンプル</button>
          <button type="button" id="clearBtn" class="danger">クリア</button>
        </div>
        <button type="button" id="startBtn" class="start">抽選を開始する</button>
        <div class="error" id="error"></div>
      </aside>

      <section class="stage" aria-label="抽選ステージ">
        <div class="grid" id="grid"></div>
      </section>
    </section>

    <section class="resultbar">
      <button type="button" id="pauseBtn">一時停止</button>
      <button type="button" id="resetBtn">リセット</button>
      <button type="button" id="recordBtn">録画モード</button>
      <div class="winner">当選者：<span id="winner">---</span></div>
    </section>
  </main>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modalTitle" id="modalTitle">当選</div>
      <div class="modalName" id="modalName">---</div>
      <button type="button" id="closeBtn">閉じる</button>
    </div>
  </div>

  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const input = $("input");
      const grid = $("grid");
      const count = $("count");
      const remaining = $("remaining");
      const error = $("error");
      const winner = $("winner");
      const overlay = $("overlay");
      const modalName = $("modalName");
      const startBtn = $("startBtn");
      const pauseBtn = $("pauseBtn");
      const durationSelect = $("durationSelect");
      const recordBtn = $("recordBtn");
      const historyButtons = $("historyButtons");

      let participants = [];
      let timer = null;
      let running = false;
      let paused = false;
      let stepDelay = 500;
      let audioContext = null;
      const firstStepDelay = 520;
      const historyKey = "ninja_lottery_history_v1";

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[char]);
      }

      function parseParticipants() {
        const lines = input.value.split(/\r?\n/);
        const parsed = [];
        const errors = [];

        lines.forEach((line, index) => {
          const raw = line.trim();
          if (!raw) return;

          let number;
          let name;
          const separated = raw.match(/^(\d+)\s*(?:,|\t)\s*(.+)$/);

          if (separated) {
            number = Number(separated[1]);
            name = separated[2].trim();
          } else {
            errors.push(`${index + 1}行目`);
            return;
          }

          if (!Number.isInteger(number) || number <= 0 || !name) {
            errors.push(`${index + 1}行目`);
            return;
          }

          parsed.push({ number, name, alive: true });
        });

        return { parsed, errors };
      }

      function setError(message) {
        error.style.display = message ? "block" : "none";
        error.textContent = message || "";
      }

      function aliveParticipants() {
        return participants.filter((item) => item.alive);
      }

      function loadHistory() {
        try {
          const value = JSON.parse(localStorage.getItem(historyKey) || "[]");
          return Array.isArray(value) ? value.slice(0, 3) : [];
        } catch (error) {
          return [];
        }
      }

      function saveHistoryEntry() {
        const text = input.value.trim();
        if (!text) return;

        const entry = {
          input: text,
          duration: durationSelect.value,
          savedAt: Date.now()
        };
        const history = loadHistory()
          .filter((item) => item.input !== entry.input || item.duration !== entry.duration);
        history.unshift(entry);
        localStorage.setItem(historyKey, JSON.stringify(history.slice(0, 3)));
        renderHistory();
      }

      function renderHistory() {
        const history = loadHistory();
        historyButtons.innerHTML = "";

        for (let index = 0; index < 3; index++) {
          const item = history[index];
          const button = document.createElement("button");
          button.type = "button";
          button.className = "historyBtn";
          button.textContent = item ? `履歴${index + 1}` : `空${index + 1}`;
          if (!item) {
            button.disabled = true;
            button.classList.add("empty");
          } else {
            button.addEventListener("click", () => {
              if (running) return;
              input.value = item.input;
              durationSelect.value = item.duration || "15";
              applyInput();
            });
          }
          historyButtons.appendChild(button);
        }
      }

      function restoreLatestHistory() {
        const latest = loadHistory()[0];
        if (!latest) return false;
        input.value = latest.input;
        durationSelect.value = latest.duration || "15";
        applyInput();
        return true;
      }

      function updateRecordLayout() {
        const total = Math.max(1, participants.length);
        const cols = Math.max(2, Math.ceil(Math.sqrt(total * 9 / 16)));
        const rows = Math.max(1, Math.ceil(total / cols));
        const dense = total > 24;
        const veryDense = total > 48;
        const charW = Math.max(28, Math.min(76, Math.round(220 / Math.sqrt(total))));
        const charH = Math.round(charW * 1.2);
        const nameFont = Math.max(8, Math.min(14, Math.round(30 / Math.sqrt(total) + 8)));
        const numberFont = Math.max(8, Math.min(13, nameFont));
        const gap = veryDense ? 3 : dense ? 4 : 8;
        const pad = veryDense ? 3 : dense ? 4 : 8;

        grid.style.setProperty("--record-cols", String(cols));
        grid.style.setProperty("--record-rows", String(rows));
        grid.style.setProperty("--record-char-w", `${charW}px`);
        grid.style.setProperty("--record-char-h", `${charH}px`);
        grid.style.setProperty("--record-name-font", `${nameFont}px`);
        grid.style.setProperty("--record-number-font", `${numberFont}px`);
        grid.style.setProperty("--record-number-h", `${Math.max(18, numberFont + 10)}px`);
        grid.style.setProperty("--record-doron-font", `${Math.max(18, Math.min(34, nameFont * 2))}px`);
        grid.style.setProperty("--record-gap", `${gap}px`);
        grid.style.setProperty("--record-pad", `${pad}px`);
      }

      function unlockAudio() {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return null;
        if (!audioContext) audioContext = new AudioCtor();
        if (audioContext.state === "suspended") audioContext.resume();
        return audioContext;
      }

      function playWinnerSound() {
        const ctx = unlockAudio();
        if (!ctx) return;

        const now = ctx.currentTime;
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.28, now + 0.02);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 1.25);
        master.connect(ctx.destination);

        [523.25, 659.25, 783.99].forEach((frequency, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = index === 0 ? "triangle" : "sine";
          osc.frequency.setValueAtTime(frequency, now + index * 0.08);
          gain.gain.setValueAtTime(0.0001, now + index * 0.08);
          gain.gain.exponentialRampToValueAtTime(0.55 / (index + 1), now + index * 0.08 + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.95 + index * 0.08);
          osc.connect(gain);
          gain.connect(master);
          osc.start(now + index * 0.08);
          osc.stop(now + 1.3);
        });
      }

      function render() {
        grid.innerHTML = "";
        updateRecordLayout();
        participants.forEach((item, index) => {
          const characterSrc = item.number >= 41 && item.number <= 50 ? "assets/monkey-cutout.png" : "assets/ninja-cutout.png";
          const characterLabel = item.number >= 41 && item.number <= 50 ? "猿" : "忍者";
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.index = String(index);
          card.innerHTML = `
            <img class="character" src="${characterSrc}" alt="${characterLabel}">
            <div class="number">${escapeHtml(item.number)}忍</div>
            <div class="name">${escapeHtml(item.name)}</div>
            <div class="smoke"></div>
            <div class="doron">ドロン</div>
          `;
          grid.appendChild(card);
        });

        const aliveCount = aliveParticipants().length;
        count.textContent = `${participants.length}名`;
        remaining.textContent = String(aliveCount);
      }

      function applyInput() {
        clearTimeout(timer);
        running = false;
        paused = false;
        startBtn.disabled = false;
        durationSelect.disabled = false;
        pauseBtn.textContent = "一時停止";
        winner.textContent = "---";
        overlay.classList.remove("show");

        const result = parseParticipants();
        participants = result.parsed;

        if (result.errors.length) {
          setError(`読み取れない行があります：${result.errors.join("、")}`);
        } else if (participants.length > 0 && participants.length < 2) {
          setError("抽選には2名以上の参加者が必要です。");
        } else {
          setError("");
        }

        render();
      }

      function step() {
        if (!running || paused) return;

        const alive = aliveParticipants();
        if (alive.length <= 1) {
          finish();
          return;
        }

        const victim = alive[Math.floor(Math.random() * alive.length)];
        victim.alive = false;

        const index = participants.indexOf(victim);
        const card = document.querySelector(`.card[data-index="${index}"]`);
        if (card) {
          card.classList.add("out");
          setTimeout(() => card.classList.add("hide"), 740);
        }

        remaining.textContent = String(alive.length - 1);
        timer = setTimeout(step, stepDelay);
      }

      function start() {
        unlockAudio();
        applyInput();
        if (participants.length < 2 || error.style.display === "block") return;

        const durationMs = Number(durationSelect.value) * 1000;
        stepDelay = Math.max(40, Math.round((durationMs - firstStepDelay) / (participants.length - 1)));
        saveHistoryEntry();
        running = true;
        paused = false;
        startBtn.disabled = true;
        durationSelect.disabled = true;
        timer = setTimeout(step, firstStepDelay);
      }

      function finish() {
        clearTimeout(timer);
        running = false;
        paused = false;
        startBtn.disabled = false;
        durationSelect.disabled = false;

        const alive = aliveParticipants();
        if (!alive.length) return;

        const selected = alive[0];
        const index = participants.indexOf(selected);
        const card = document.querySelector(`.card[data-index="${index}"]`);
        if (card) card.classList.add("win");

        const text = `${selected.number}忍 ${selected.name}`;
        winner.textContent = text;
        modalName.textContent = text;
        playWinnerSound();
        overlay.classList.add("show");
      }

      function loadSample() {
        input.value = [
          "1,田中 太郎",
          "2,佐藤 花子",
          "3,鈴木 一郎",
          "4,山田 次郎",
          "41,伊藤 さくら",
          "45,渡辺 直樹",
          "50,高橋 みなみ",
          "88,小林 健"
        ].join("\n");
        applyInput();
      }

      $("startBtn").addEventListener("click", start);
      $("resetBtn").addEventListener("click", applyInput);
      $("sampleBtn").addEventListener("click", loadSample);
      $("clearBtn").addEventListener("click", () => {
        input.value = "";
        applyInput();
      });
      $("closeBtn").addEventListener("click", () => overlay.classList.remove("show"));
      $("overlay").addEventListener("click", (event) => {
        if (event.target === overlay) overlay.classList.remove("show");
      });
      $("pauseBtn").addEventListener("click", () => {
        if (!running) return;
        paused = !paused;
        pauseBtn.textContent = paused ? "再開" : "一時停止";
        if (!paused) timer = setTimeout(step, stepDelay);
      });
      recordBtn.addEventListener("click", () => {
        const enabled = document.body.classList.toggle("recordMode");
        recordBtn.textContent = enabled ? "通常表示" : "録画モード";
      });
      input.addEventListener("input", () => {
        const result = parseParticipants();
        count.textContent = `${result.parsed.length}名`;
        remaining.textContent = String(result.parsed.length);
      });

      renderHistory();
      if (!restoreLatestHistory()) loadSample();
    })();
  </script>
</body>
</html>
