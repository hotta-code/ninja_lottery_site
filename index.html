<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>忍者の分身 抽選</title>
<style>
:root{
  --bg:#050505;--panel:#151515;--line:#3d3425;--gold:#e5b95e;
  --text:#fff;--muted:#bdb7ab;--danger:#a53b31;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% 0,#242018 0,#090909 42%,#000 100%);color:var(--text);font-family:"Yu Mincho","Hiragino Mincho ProN","Yu Gothic","Hiragino Kaku Gothic ProN",serif}
body{min-height:100vh;overflow-x:hidden}
button,select,textarea,input{font:inherit}
button{cursor:pointer}
.app{width:min(1400px,100%);margin:auto;padding:18px 16px 32px}
.header{text-align:center;margin-bottom:14px}
.title{font-size:clamp(30px,5vw,64px);margin:0;letter-spacing:.1em;text-shadow:0 3px 0 #000,0 0 18px rgba(229,185,94,.35)}
.subtitle{color:var(--gold);font-size:clamp(13px,2vw,20px);letter-spacing:.22em;margin-top:4px}
.setup{display:grid;grid-template-columns:minmax(300px,430px) 1fr;gap:16px;align-items:start}
.panel{background:rgba(18,18,18,.94);border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 35px #0008;padding:16px}
.panel h2{margin:0 0 10px;font-size:20px}
.help{color:var(--muted);font-size:13px;line-height:1.7}
textarea{width:100%;height:250px;resize:vertical;background:#070707;color:#fff;border:1px solid #544830;border-radius:10px;padding:12px;line-height:1.55}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
.count{margin-left:auto;color:var(--gold);font-weight:700}
select,button{border:1px solid #65573c;border-radius:9px;background:#242018;color:#fff;padding:10px 13px}
button.primary{background:linear-gradient(#c89c45,#8d5e18);border-color:#f0ca7e;color:#100b04;font-weight:800}
button.danger{background:#3a1512;border-color:#8d453d}
button:disabled{opacity:.45;cursor:not-allowed}
.stage-panel{min-height:470px}
.stage-toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.stage{position:relative;min-height:390px;border-radius:14px;border:1px solid #403727;background:
radial-gradient(circle at center,#251f16 0,#0b0b0b 52%,#020202 100%);overflow:hidden;padding:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:9px;align-content:start}
.card{position:relative;min-width:0;background:linear-gradient(180deg,#211d17,#0a0a0a);border:1px solid #51442e;border-radius:11px;padding:6px 5px 7px;text-align:center;transition:transform .4s,opacity .6s,filter .6s}
.card img{width:100%;height:88px;object-fit:contain;display:block;filter:drop-shadow(0 5px 4px #000)}
.card .fallback{height:88px;display:none;align-items:center;justify-content:center;font-size:58px}
.card .num{font-weight:800;color:var(--gold);font-size:13px;white-space:nowrap}
.card .name{font-weight:800;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card.eliminating{animation:shake .28s linear 3}
.card.gone{opacity:0;transform:scale(.25) rotate(13deg);filter:blur(7px)}
.smoke{position:absolute;inset:0;display:none;place-items:center;pointer-events:none;font-size:70px;filter:drop-shadow(0 0 10px #fff)}
.card.eliminating .smoke{display:grid;animation:smoke .8s ease-out forwards}
.status{text-align:center;margin-top:10px;min-height:30px;font-size:clamp(18px,2.4vw,30px);font-weight:800;color:var(--gold)}
.winner-overlay{position:fixed;inset:0;z-index:30;display:none;place-items:center;background:rgba(0,0,0,.82);padding:20px}
.winner-overlay.show{display:grid;animation:fade .3s}
.winner-box{width:min(640px,95vw);text-align:center;background:radial-gradient(circle,#392a13,#080808 66%);border:2px solid var(--gold);border-radius:24px;padding:24px;box-shadow:0 0 70px #dca94066}
.winner-label{font-size:clamp(22px,4vw,42px);color:var(--gold);letter-spacing:.18em}
.winner-name{font-size:clamp(38px,8vw,86px);font-weight:900;margin:12px 0}
.winner-num{font-size:clamp(22px,4vw,38px)}
.recording .setup .panel:first-child,.recording .header,.recording .stage-toolbar .non-record,.recording footer{display:none!important}
.recording .setup{display:block}
.recording .stage-panel{border:0;background:transparent;box-shadow:none;padding:0;min-height:100vh}
.recording .stage{border:0;border-radius:0;min-height:calc(100vh - 58px);padding:8px}
.recording .grid{grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:5px}
.recording .card{padding:3px}
.recording .card img,.recording .card .fallback{height:clamp(50px,10vh,100px)}
.recording .card .num{font-size:clamp(10px,1.4vw,14px)}
.recording .card .name{font-size:clamp(10px,1.45vw,15px)}
.record-exit{display:none!important}
.recording .record-exit{display:inline-block!important;position:fixed;right:10px;top:10px;z-index:40;opacity:.28}
.recording .record-exit:hover{opacity:1}
footer{text-align:center;color:#7d776c;font-size:12px;margin-top:14px}
@keyframes shake{25%{transform:translateX(-4px) rotate(-2deg)}75%{transform:translateX(4px) rotate(2deg)}}
@keyframes smoke{0%{opacity:0;transform:scale(.2)}35%{opacity:1}100%{opacity:0;transform:scale(1.8)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@media(max-width:800px){
 .app{padding:10px 8px 18px}.setup{grid-template-columns:1fr}.stage-panel{min-height:420px}
 textarea{height:190px}.grid{grid-template-columns:repeat(auto-fit,minmax(76px,1fr));gap:6px}
 .card img,.card .fallback{height:70px}.card .name{font-size:12px}.card .num{font-size:11px}
}
</style>
</head>
<body>
<button id="exitRecord" class="record-exit">録画モード終了</button>
<div class="app">
<header class="header">
  <h1 class="title">本物の忍者は誰だ！？</h1>
  <div class="subtitle">忍者の分身 抽選</div>
</header>

<div class="setup">
<section class="panel">
  <h2>参加者入力（最大80名）</h2>
  <div class="help">1行につき「忍番号,名前」。Excelの2列貼り付け（タブ区切り）にも対応。41〜50忍は猿、それ以外は忍者で表示します。</div>
  <textarea id="input" placeholder="1,ヨッシー&#10;2,やまだ"></textarea>
  <div class="row">
    <button id="clearBtn">クリア</button>
    <button id="sampleBtn">サンプル</button>
    <span class="count" id="count">0名</span>
  </div>
  <div class="row">
    <label>決定まで
      <select id="duration">
        <option value="8">8秒</option>
        <option value="12" selected>12秒</option>
        <option value="15">15秒</option>
        <option value="20">20秒</option>
        <option value="30">30秒</option>
      </select>
    </label>
    <button id="startBtn" class="primary">抽選を開始する</button>
  </div>
</section>

<section class="panel stage-panel">
  <div class="stage-toolbar">
    <button id="recordBtn" class="primary">📹 録画用画面</button>
    <button id="pauseBtn" class="non-record" disabled>一時停止</button>
    <button id="resetBtn" class="danger non-record">リセット</button>
    <button id="fullscreenBtn" class="non-record">全画面</button>
  </div>
  <div class="stage" id="stage">
    <div class="grid" id="grid"></div>
  </div>
  <div class="status" id="status">参加者を入力してください</div>
</section>
</div>
<footer>最大80名対応・録画モード搭載</footer>
</div>

<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-box">
    <div class="winner-label">当選者</div>
    <div class="winner-name" id="winnerName">---</div>
    <div class="winner-num" id="winnerNum">---</div>
    <div class="row" style="justify-content:center;margin-top:18px">
      <button id="closeWinner" class="primary">閉じる</button>
    </div>
  </div>
</div>

<script>
(()=>{
"use strict";
const $=s=>document.querySelector(s);
const input=$("#input"), count=$("#count"), grid=$("#grid"), status=$("#status");
const startBtn=$("#startBtn"), pauseBtn=$("#pauseBtn"), resetBtn=$("#resetBtn");
const overlay=$("#winnerOverlay"), winnerName=$("#winnerName"), winnerNum=$("#winnerNum");
const NINJA_IMG="IMG_2231-removebg-preview%20(1).png";
const MONKEY_IMG="IMG_3090_1-removebg-preview%20(1).png";
let participants=[], active=[], timer=null, running=false, paused=false, endAt=0, nextAt=0;

function parse(){
 const lines=input.value.replace(/\r/g,"").split("\n").map(v=>v.trim()).filter(Boolean);
 const out=[], seen=new Set();
 for(const line of lines){
   let parts=line.includes("\t")?line.split("\t"):line.split(",");
   if(parts.length<2) continue;
   const num=parseInt(String(parts.shift()).replace(/[^\d]/g,""),10);
   const name=parts.join(",").trim();
   if(!Number.isFinite(num)||!name) continue;
   const key=num+"|"+name;
   if(!seen.has(key)){seen.add(key);out.push({num,name});}
   if(out.length>=80) break;
 }
 return out;
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function updateCount(){
 const n=parse().length; count.textContent=n+"名";
 if(!running) renderPreview();
}
function cardHTML(p,i){
 const monkey=p.num>=41&&p.num<=50;
 return `<div class="card" data-i="${i}">
   <img src="${monkey?MONKEY_IMG:NINJA_IMG}" alt="${monkey?"猿":"忍者"}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
   <div class="fallback">${monkey?"🐒":"🥷"}</div>
   <div class="smoke">☁️</div>
   <div class="num">${p.num}忍</div><div class="name" title="${esc(p.name)}">${esc(p.name)}</div>
 </div>`;
}
function render(list){
 grid.innerHTML=list.map(cardHTML).join("");
 fitGrid(list.length);
}
function fitGrid(n){
 if(!n)return;
 const w=$("#stage").clientWidth-20, h=$("#stage").clientHeight-20;
 const cols=Math.ceil(Math.sqrt(n*w/Math.max(h,1)));
 const safe=Math.max(3,Math.min(n,cols));
 grid.style.gridTemplateColumns=`repeat(${safe},minmax(0,1fr))`;
}
function renderPreview(){
 participants=parse(); render(participants);
 status.textContent=participants.length?`${participants.length}名の参加者`:"参加者を入力してください";
}
function start(){
 participants=parse();
 if(participants.length<2){alert("参加者を2名以上入力してください。");return;}
 active=participants.map((p,i)=>({...p,id:i}));
 render(active); running=true;paused=false;
 startBtn.disabled=true;input.disabled=true;pauseBtn.disabled=false;pauseBtn.textContent="一時停止";
 const seconds=Number($("#duration").value)||12;
 endAt=performance.now()+seconds*1000;
 nextAt=performance.now()+Math.max(180,(seconds*1000)/(active.length-1));
 status.textContent="抽選中…";
 timer=requestAnimationFrame(tick);
}
function tick(now){
 if(!running)return;
 if(paused){timer=requestAnimationFrame(tick);return;}
 const remain=Math.max(0,endAt-now);
 status.textContent=`抽選中… 残り ${(remain/1000).toFixed(1)}秒`;
 if(active.length>1 && (now>=nextAt || remain<500)){
   eliminateOne();
   const remainingSteps=Math.max(1,active.length-1);
   nextAt=now+Math.max(120,(endAt-now)/remainingSteps);
 }
 if(active.length===1 || now>=endAt){
   while(active.length>1) eliminateOne(true);
   finish();return;
 }
 timer=requestAnimationFrame(tick);
}
function eliminateOne(immediate=false){
 if(active.length<=1)return;
 const idx=Math.floor(Math.random()*active.length);
 const cards=[...grid.children], card=cards[idx];
 if(card&&!immediate){
   card.classList.add("eliminating");
   setTimeout(()=>card.classList.add("gone"),260);
   setTimeout(()=>{active.splice(idx,1);render(active);},760);
 }else{
   active.splice(idx,1);render(active);
 }
}
function finish(){
 running=false;cancelAnimationFrame(timer);timer=null;
 startBtn.disabled=false;input.disabled=false;pauseBtn.disabled=true;
 const w=active[0];
 render(active);
 status.textContent=`当選者：${w.name}（${w.num}忍）`;
 winnerName.textContent=w.name;winnerNum.textContent=w.num+"忍";overlay.classList.add("show");
 try{navigator.vibrate&&navigator.vibrate([120,70,180]);}catch(e){}
}
function reset(){
 running=false;paused=false;cancelAnimationFrame(timer);timer=null;
 input.disabled=false;startBtn.disabled=false;pauseBtn.disabled=true;pauseBtn.textContent="一時停止";
 overlay.classList.remove("show");renderPreview();
}
function togglePause(){
 if(!running)return;paused=!paused;pauseBtn.textContent=paused?"再開":"一時停止";status.textContent=paused?"一時停止中":"抽選中…";
}
function enterRecording(){
 document.body.classList.add("recording");renderPreview();
 setTimeout(()=>{fitGrid(parse().length);window.scrollTo(0,0);},100);
}
function exitRecording(){document.body.classList.remove("recording");renderPreview();}
input.addEventListener("input",updateCount);
$("#clearBtn").onclick=()=>{input.value="";updateCount();input.focus();};
$("#sampleBtn").onclick=()=>{input.value="1,ヨッシー\n2,やまだ\n3,みらくる☆桃香\n41,オッス\n42,桜川俊信";updateCount();};
startBtn.onclick=start;pauseBtn.onclick=togglePause;resetBtn.onclick=reset;
$("#recordBtn").onclick=enterRecording;$("#exitRecord").onclick=exitRecording;
$("#closeWinner").onclick=()=>overlay.classList.remove("show");
$("#fullscreenBtn").onclick=async()=>{try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen();}catch(e){}};
window.addEventListener("resize",()=>fitGrid((running?active:parse()).length));
document.addEventListener("keydown",e=>{
 if(e.key==="Escape"&&document.body.classList.contains("recording"))exitRecording();
 if(e.code==="Space"&&running){e.preventDefault();togglePause();}
});
updateCount();
})();
</script>
</body>
</html>
