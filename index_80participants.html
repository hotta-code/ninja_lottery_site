<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>忍者の分身 抽選</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;background:#000;color:#fff;min-height:100%;}
body{
  font-family:"Yu Gothic","YuGothic","游ゴシック","Meiryo",sans-serif;
  background:#000;
}
.app{max-width:1500px;margin:0 auto;padding:18px;}
.logoBox{text-align:center;margin-bottom:16px;}
.logo{width:min(470px,70vw);height:auto;display:inline-block;}
.wrap{display:grid;grid-template-columns:380px 1fr;gap:18px;align-items:start;}
.panel,.stage,.footer{
  border:1px solid #333;
  border-radius:12px;
  background:#050505;
  box-shadow:0 0 20px rgba(255,255,255,.04);
}
.panel{padding:18px;}
h2{margin:0 0 14px;font-size:26px;}
textarea{
  width:100%;height:300px;resize:vertical;
  background:#111;color:#fff;border:1px solid #444;border-radius:10px;
  padding:14px;font-size:20px;line-height:1.55;
  font-family:"Yu Gothic","YuGothic","游ゴシック","Meiryo",sans-serif;
}
button{
  appearance:none;-webkit-appearance:none;
  border:1px solid #444;border-radius:10px;
  background:#141414;color:#fff;
  padding:13px 16px;font-size:18px;font-weight:800;
  font-family:"Yu Gothic","YuGothic","游ゴシック","Meiryo",sans-serif;
  cursor:pointer;
}
button:active{transform:translateY(1px)}
.start{width:100%;margin-top:14px;background:linear-gradient(135deg,#ffe27a,#f4b928);color:#000;border:0;font-size:24px;padding:17px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.count{text-align:right;margin-top:10px;color:#ddd;font-weight:800;}
.err{display:none;margin-top:10px;padding:10px;border:1px solid #883333;background:#230000;color:#ffb8b8;border-radius:8px;font-weight:800;}
.stage{padding:24px;min-height:540px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:38px 28px;}
.grid.dense{grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:24px 14px;}
.grid.veryDense{grid-template-columns:repeat(auto-fit,minmax(82px,1fr));gap:16px 8px;}
.grid.dense .card{min-height:205px;}
.grid.dense .figbox{height:138px;}
.grid.dense .fig{max-width:125px;max-height:134px;}
.grid.dense .no{font-size:19px;margin-top:8px;}
.grid.dense .name{font-size:17px;margin-top:3px;}
.grid.veryDense .card{min-height:168px;}
.grid.veryDense .figbox{height:108px;}
.grid.veryDense .fig{max-width:96px;max-height:104px;}
.grid.veryDense .no{font-size:16px;margin-top:6px;}
.grid.veryDense .name{font-size:14px;margin-top:2px;}
.card{position:relative;text-align:center;min-height:250px;}
.figbox{height:175px;display:flex;align-items:end;justify-content:center;background:#000;}
.fig{max-width:165px;max-height:170px;object-fit:contain;}
.no{display:block;margin-top:12px;font-size:25px;font-weight:900;}
.name{display:block;margin-top:5px;font-size:24px;font-weight:900;line-height:1.2;word-break:break-word;}
.smoke{
  position:absolute;inset:0;opacity:0;pointer-events:none;filter:blur(7px);
  background:
    radial-gradient(circle at 40% 40%,rgba(255,255,255,.95) 0 12%,transparent 30%),
    radial-gradient(circle at 55% 52%,rgba(255,255,255,.85) 0 18%,transparent 42%),
    radial-gradient(circle at 65% 36%,rgba(255,255,255,.7) 0 13%,transparent 32%);
}
.card.out{animation:vanish .75s ease forwards;}
.card.out .smoke{animation:smoke .75s ease forwards;}
.card.hide{display:none;}
.card.win{transform:scale(1.12);filter:drop-shadow(0 0 28px #ffd65a);}
@keyframes smoke{0%{opacity:0;transform:scale(.4)}30%{opacity:1}100%{opacity:0;transform:scale(1.8) translateY(-35px)}}
@keyframes vanish{0%{opacity:1;transform:scale(1)}60%{opacity:.3;transform:scale(.9)}100%{opacity:0;transform:scale(.5)}}
.footer{margin-top:18px;padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:center;}
.winner{font-size:24px;font-weight:900;color:#ffd65a;text-align:center;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:99;align-items:center;justify-content:center;text-align:center;padding:20px;}
.modal{border:2px solid #ffd65a;border-radius:20px;padding:34px;background:#050505;max-width:800px;width:100%;}
.modalTitle{font-size:64px;font-weight:900;color:#ffd65a;}
.modalName{font-size:46px;font-weight:900;margin-top:12px;}
@media(max-width:900px){
  .wrap{grid-template-columns:1fr;}
  .footer{grid-template-columns:1fr;}
  textarea{height:230px;font-size:18px;}
  .grid{grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:24px 10px;}
  .grid.dense{grid-template-columns:repeat(auto-fit,minmax(78px,1fr));gap:14px 6px;}
  .grid.veryDense{grid-template-columns:repeat(auto-fit,minmax(62px,1fr));gap:10px 4px;}
  .grid.veryDense .card{min-height:132px;}
  .grid.veryDense .figbox{height:82px;}
  .grid.veryDense .fig{max-width:72px;max-height:78px;}
  .grid.veryDense .no{font-size:12px;}
  .grid.veryDense .name{font-size:11px;}
  .figbox{height:145px;}
  .fig{max-width:135px;max-height:140px;}
  .no{font-size:20px;}
  .name{font-size:19px;}
}
</style>
</head>

      if(!raw) continue;
      var parts;
      if(raw.indexOf("\t") >= 0) parts = raw.split("\t");
      else if(raw.indexOf(",") >= 0) parts = raw.split(",");
      else if(raw.indexOf("，") >= 0) parts = raw.split("，");
      else {
        var m = raw.match(/^(\d+)\s+(.+)$/);
        parts = m ? [m[1],m[2]] : [raw,""];
      }
      var n = Number(String(parts[0] || "").replace("忍","").trim());
      var name = parts.slice(1).join(" ").trim() || "忍者の分身";
      if(!Number.isInteger(n) || n <= 0){
        errors.push((i+1)+"行目");
        continue;
      }
      arr.push({number:n,name:name,img:(n>=41 && n<=50)?IMG_MONKEY:IMG_NINJA,alive:true});
    }
    return {arr:arr,errors:errors};
  }

  function showErr(msg){
    err.style.display = msg ? "block" : "none";
    err.textContent = msg || "";
  }

  function render(){
    grid.innerHTML = "";
    grid.className = "grid";
    if(participants.length > 60) grid.classList.add("veryDense");
    else if(participants.length > 36) grid.classList.add("dense");
    for(var i=0;i<participants.length;i++){
      var p = participants[i];
      var div = document.createElement("div");
      div.className = "card";
      div.setAttribute("data-index", i);
      div.innerHTML =
        '<div class="figbox"><img class="fig" src="'+p.img+'" alt=""></div>'+
        '<span class="no">'+escapeHtml(p.number)+'忍</span>'+
        '<span class="name">'+escapeHtml(p.name)+'</span>'+
        '<div class="smoke"></div>';
      grid.appendChild(div);
    }
    count.textContent = participants.length + "名が参加します";
  }

  function apply(){
    clearTimeout(timer);
    running = false;
    paused = false;
    startBtn.disabled = false;
    pauseBtn.textContent = "一時停止";
    winner.textContent = "---";
    overlay.style.display = "none";
    var p = parse();
    participants = p.arr;
    if(p.errors.length) showErr("忍番号が正しくない行があります：" + p.errors.join("、"));
    else if(participants.length < 2) showErr("参加者を2名以上入力してください。");
    else if(participants.length > 80) showErr("参加者は最大80名までです。現在 " + participants.length + "名入力されています。");
    else showErr("");
    render();
  }

  function alive(){
    return participants.filter(function(p){return p.alive;});
  }

  function step(){
    if(!running || paused) return;
    var a = alive();
    if(a.length <= 1) return finish();
    var victim = a[Math.floor(Math.random()*a.length)];
    victim.alive = false;
    var idx = participants.indexOf(victim);
    var card = document.querySelector('.card[data-index="'+idx+'"]');
    if(card){
      card.classList.add("out");
      setTimeout(function(c){c.classList.add("hide");},760,card);
    }
    count.textContent = "残り " + (a.length-1) + "名";
    timer = setTimeout(step, 420);
  }

  function start(){
    apply();
    if(participants.length < 2 || participants.length > 80 || err.style.display === "block") return;
    running = true;
    paused = false;
    startBtn.disabled = true;
    timer = setTimeout(step, 500);
  }

  function finish(){
    clearTimeout(timer);
    running = false;
    paused = false;
    startBtn.disabled = false;
    var a = alive();
    if(!a.length) return;
    var w = a[0];
    var idx = participants.indexOf(w);
    var card = document.querySelector('.card[data-index="'+idx+'"]');
    if(card) card.classList.add("win");
    var text = w.number + "忍　" + w.name;
    winner.textContent = text;
    modalName.textContent = text;
    overlay.style.display = "flex";
  }

  function sample(){
    input.value = [
      "1,田中太郎",
      "7,佐藤花子",
      "15,鈴木一郎",
      "23,山田次郎",
      "41,伊藤健",
      "45,中村美咲",
      "52,小林三郎",
      "100,渡辺直樹"
    ].join("\n");
    apply();
  }

  document.getElementById("startBtn").onclick = start;
  document.getElementById("resetBtn").onclick = apply;
  document.getElementById("clearBtn").onclick = function(){input.value="";apply();};
  document.getElementById("sampleBtn").onclick = sample;
  document.getElementById("closeBtn").onclick = function(){overlay.style.display="none";};
  document.getElementById("pauseBtn").onclick = function(){
    if(!running) return;
    paused = !paused;
    pauseBtn.textContent = paused ? "再開" : "一時停止";
    if(!paused) timer = setTimeout(step, 100);
  };
  input.oninput = function(){
    var p = parse();
    count.textContent = p.arr.length + "名が参加します";
  };

  sample();
})();
</script>
</body>
</html>
